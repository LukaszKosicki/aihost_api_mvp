name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout kodu
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Login do GHCR
      - name: Login to GHCR
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      # 3️⃣ Build backend Docker image
      - name: Build backend Docker image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/aihost_api_mvp:latest .

      # 4️⃣ Push obrazu do GHCR
      - name: Push backend image
        run: docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/aihost_api_mvp:latest

      # 5️⃣ Utworzenie / aktualizacja Secret w Kubernetes
      - name: Update Kubernetes Secrets
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "🧱 Tworzenie namespace, jeśli nie istnieje..."
            sudo kubectl get ns aihost-mvp || sudo kubectl create ns aihost-mvp

            echo "🔑 Aktualizacja sekretów..."
            sudo kubectl -n aihost-mvp delete secret aihost-secrets --ignore-not-found
            sudo kubectl -n aihost-mvp create secret generic aihost-secrets \
              --from-literal=JWT_KEY='${{ secrets.JWT_KEY }}' \
              --from-literal=CONNECTION_STRING='${{ secrets.CONNECTION_STRING }}'

      # 6️⃣ Deploy obrazu i restart backendu
      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            echo "🚀 Aktualizacja obrazu w deployment..."
            sudo kubectl -n aihost-mvp set image deployment/aihost-api-mvp myapi=ghcr.io/${{ secrets.GHCR_USERNAME }}/aihost_api_mvp:latest --record

            echo "♻️ Restart deploymentu..."
            sudo kubectl -n aihost-mvp rollout restart deployment aihost-api-mvp

            echo "⏳ Oczekiwanie na zakończenie rollout..."
            sudo kubectl -n aihost-mvp rollout status deployment aihost-api-mvp

            echo "✅ Backend został wdrożony pomyślnie!"
