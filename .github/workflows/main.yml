name: Backend CI/CD (AIHOST MVP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout kodu
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Build Docker image
      - name: Build backend Docker image
        run: |
          docker build -t aihost_api:latest .
          docker tag aihost_api:latest ghcr.io/${{ secrets.GHCR_USERNAME }}/aihost_api:latest

      # 3️⃣ Login do GHCR
      - name: Login to GHCR
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      # 4️⃣ Push image do GHCR
      - name: Push backend image
        run: docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/aihost_api:latest

      # 5️⃣ Aktualizacja sekretów w Kubernetes
      - name: Update Kubernetes Secrets
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            export KUBECONFIG=/home/ubuntu/.kube/config

            echo "🧱 Tworzenie namespace jeśli nie istnieje..."
            kubectl get ns aihost-mvp || kubectl create ns aihost-mvp

            echo "🔑 Usuwanie istniejącego secret..."
            kubectl -n aihost-mvp delete secret aihost-secrets --ignore-not-found

            echo "🔑 Tworzenie secret z connection string i JWT..."
            kubectl -n aihost-mvp create secret generic aihost-secrets \
              --from-literal=JWT_KEY="${{ secrets.JWT_KEY }}" \
              --from-literal=CONNECTION_STRING="${{ secrets.CONNECTION_STRING }}"

      # 6️⃣ Deploy i restart backendu
      - name: Deploy to k3s
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            export KUBECONFIG=/home/ubuntu/.kube/config

            echo "🚀 Ustawienie obrazu w deployment..."
            kubectl -n aihost-mvp set image deployment/aihost-api-mvp myapi=ghcr.io/${{ secrets.GHCR_USERNAME }}/aihost_api:latest

            echo "♻️ Restart deploymentu..."
            kubectl -n aihost-mvp rollout restart deployment aihost-api-mvp
            kubectl -n aihost-mvp rollout status deployment aihost-api-mvp
